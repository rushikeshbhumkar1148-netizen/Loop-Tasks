<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Print each element of the array: ["Apple", "Banana", "Mango", "Orange"]</h1>

    <script>
        console.log('Print each element of the array: ["Apple", "Banana", "Mango", "Orange"]');
        let arr = ["Apple", "Banana", "Mango", "Orange"];
        for (let i = 0; i < arr.length; i++) {
            console.log(arr[i]);
        }
    </script>
</body>

</html>
