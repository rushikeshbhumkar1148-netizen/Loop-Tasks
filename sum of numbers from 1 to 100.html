<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Find and print the sum of numbers from 1 to 100.</h1>

    <script>
        console.log("Find and print the sum of numbers from 1 to 100.");
        let sum = 0;
        for (let i = 1; i <= 100; i++) {
            sum += i;
        }
        console.log(sum);
    </script>
</body>
