<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

</head>

<body>
    <h1>Find the largest number in the array: [12, 45, 7, 89, 23]</h1>

    <script>
        console.log("Find the largest number in the array: [12, 45, 7, 89, 23]");
        let arr = [12, 45, 7, 89, 23];
        let largest = arr[0];
        for (let i = 1; i < arr.length; i++) {
            if (arr[i] > largest) {
                largest = arr[i];
            }
        }
        console.log(largest);
    </script>
</body>

</html>
