<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Print only elements which data type is number: ["Apple", 30, "Mango", 40, "Orange", 50]</h1>

    <script>
        console.log('Print only elements which data type is number: ["Apple", 30, "Mango", 40, "Orange", 50]');
        let arr = ["Apple", 30, "Mango", 40, "Orange", 50];
        for (let i = 0; i < arr.length; i++) {
            if (typeof arr[i] === "number") {
                console.log(arr[i]);
            }
        }
    </script>
</body>

</html>
