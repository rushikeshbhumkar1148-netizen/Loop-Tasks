<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Print numbers from 1 to 10 using a for loop.</h1>

    <script>
        console.log("Print numbers from 1 to 10 using a for loop.");
        for (let i = 1; i <= 10; i++) {
            console.log(i);
        }
    </script>
</body>

</html>
