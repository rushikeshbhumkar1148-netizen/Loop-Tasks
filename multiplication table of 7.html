<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Print the multiplication table of 7 from 7 × 1 to 7 × 10.</h1>

    <script>
        console.log("Print the multiplication table of 7 from 7 × 1 to 7 × 10.");
        for (let i = 1; i <= 10; i++) {
            console.log("7 x " + i + " = " + (7 * i));
        }
    </script>
</body>

</html>
